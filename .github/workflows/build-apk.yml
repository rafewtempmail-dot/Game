name: Build Test Project Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: "Test App"
  APP_ID: "com.as.testapp"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Prepare Web Assets
      run: |
        mkdir -p www
        cp index.html www/index.html || true
        cp style.css www/style.css || true
        cp script.js www/script.js || true
        if [ -f "icon.png" ]; then
          cp icon.png www/icon.png
        fi

    - name: Create Package JSON
      run: |
        echo '{"name": "test-apk-builder","version": "1.0.0","dependencies": {"@capacitor/core": "^6.0.0","@capacitor/cli": "^6.0.0","@capacitor/android": "^6.0.0"}}' > package.json

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/assets --save-dev

    - name: Initialize Capacitor
      run: |
        npx cap init "${{ env.APP_NAME }}" "${{ env.APP_ID }}" --web-dir=www
        npx cap add android

    - name: Generate Custom App Icons
      run: |
        mkdir -p assets
        if [ -f "icon.png" ]; then
          cp icon.png assets/icon.png
          npx capacitor-assets generate --android
        fi

    - name: Sync and Build Debug APK
      run: |
        npx cap sync android
        cd android && ./gradlew assembleDebug

    - name: Upload Installed Ready APK
      uses: actions/upload-artifact@v4
      with:
        name: TestApp-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
