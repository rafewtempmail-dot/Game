name: Ultimate Universal Android APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: "Univers Tp"
  APP_ID: "com.rhj.univelalapp"

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Scaffold Native Android App
      run: |
        mkdir -p android-project/app/src/main/java/com/universal/app
        mkdir -p android-project/app/src/main/assets
        mkdir -p android-project/app/src/main/res/mipmap-mdpi
        mkdir -p android-project/app/src/main/res/mipmap-hdpi
        mkdir -p android-project/app/src/main/res/mipmap-xhdpi
        mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
        mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
        mkdir -p android-project/app/src/main/res/values

    - name: Create Gradle Files
      run: |
        echo 'rootProject.name = "UniversalApp"' > android-project/settings.gradle
        
        echo 'pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }' > android-project/settings.gradle
        
        echo 'plugins { id "com.android.application" version "8.1.1" }' > android-project/build.gradle
        
        echo -e 'plugins { id "com.android.application" }\nandroid {\n    namespace "${{ env.APP_ID }}"\n    compileSdk 34\n    defaultConfig {\n        applicationId "${{ env.APP_ID }}"\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName "1.0"\n    }\n    buildTypes {\n        release {\n            minifyEnabled false\n        }\n    }\n}' > android-project/app/build.gradle

    - name: Create Android Manifest
      run: |
        echo -e '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />\n    <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="${{ env.APP_NAME }}" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>' > android-project/app/src/main/AndroidManifest.xml

    - name: Create Native WebView Java Code
      run: |
        pkg_path=$(echo "${{ env.APP_ID }}" | tr '.' '/')
        mkdir -p android-project/app/src/main/java/$pkg_path
        
        echo -e "package ${{ env.APP_ID }};\n\nimport android.os.Bundle;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\nimport android.app.Activity;\n\npublic class MainActivity extends Activity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState) ;\n        WebView webView = new WebView(this);\n        WebSettings webSettings = webView.getSettings();\n        webSettings.setJavaScriptEnabled(true);\n        webSettings.setDomStorageEnabled(true);\n        webSettings.setDatabaseEnabled(true);\n        webSettings.setAllowFileAccess(true);\n        webSettings.setAllowContentAccess(true);\n        webView.setWebViewClient(new WebViewClient());\n        \n        java.io.File file = new java.io.File(getFilesDir().getParent() + \"/assets/index.html\");\n        webView.loadUrl(\"file:///android_asset/index.html\");\n        setContentView(webView);\n    }\n}" > android-project/app/src/main/java/$pkg_path/MainActivity.java

    - name: Force Inject Web Assets
      run: |
        cp -r * android-project/app/src/main/assets/ || true
        rm -rf android-project/app/src/main/assets/android-project android-project/app/src/main/assets/.github
        cd android-project/app/src/main/assets
        if [ ! -f "index.html" ]; then
          main_html=$(ls *.html | head -n 1)
          if [ ! -z "$main_html" ]; then
            mv "$main_html" index.html
          fi
        fi

    - name: Process Custom Icon
      run: |
        sudo apt-get update && sudo apt-get install -y imagemagick
        if [ -f "icon.png" ]; then
          convert icon.png -resize 48x48 android-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 72x72 android-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 96x96 android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 android-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 android-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        else
          wget -O android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png https://developer.android.com/images/brand/Android_Robot.png
        fi

    - name: Setup Gradle Wrapper
      run: |
        cd android-project
        gradle wrapper --gradle-version 8.2

    - name: Compile Native Debug APK
      run: |
        cd android-project
        ./gradlew assembleDebug

    - name: Upload Installed Ready APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-APK
        path: android-project/app/build/outputs/apk/debug/app-debug.apk
